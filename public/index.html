<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devotional App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="date-badge" id="date-badge">
      <span class="date-number" id="day">--</span>
      <span class="date-month" id="month">--</span>
    </div>

    <div class="title" id="plan-title">Loading...</div>
    <div class="subtitle" id="plan-subtitle"></div>

    <div class="devotional-text" id="content"></div>

    <div class="question-prayer">
      <img src="icons/question.svg" class="icon-heading" />
      <h2>Reflection</h2>
      <p id="question">—</p>

      <img src="icons/prayer.svg" class="icon-heading" />
      <h2>Prayer</h2>
      <p id="prayer">—</p>
    </div>

    <div class="nav-bar">
      <button id="prev-day" title="Previous Day">←</button>
      <button id="theme-toggle" title="Toggle Dark Mode">
        <img src="icons/moon.svg" class="icon-button" />
      </button>
      <button id="next-day" title="Next Day">→</button>
    </div>
  </main>

  <!-- Modular scripts -->
  <script type="module" src="main.js"></script>
  <script type="module" src="storage.js"></script>
  <script type="module" src="theme.js"></script>
</body>
</html>
